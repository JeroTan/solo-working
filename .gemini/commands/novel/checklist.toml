description = "Run a quality checklist against a chapter or the overall story state."

prompt = """
# Task: Quality Checklist

Run predefined checklists to ensure no critical story elements have been overlooked.

## Context
Chapter number or checklist to run: {{args}}

## Execution Steps

### 1. Identify Target
Determine what the user wants to check (e.g., Chapter 5, the overall plot arc, or a specific scene).

### 2. Run Relevant Checklists

**Pre-Write Checklist (for planning a new chapter)**
- Is the character motivation clear for this scene?
- Does the setting have at least two sensory details?
- Does the scene advance the plot or develop a character?
- Is there internal or external conflict?

**Post-Write Checklist (for a finished chapter)**
- Did the chapter accomplish its goal from the plan?
- Is the pacing appropriate for this story beat?
- Is the dialogue natural and subtext-driven?
- Are there any "tell instead of show" moments?

**General Story Health Checklist**
- Are all planted foreshadowing elements tracked?
- Are the character arcs progressing as planned?
- Is the timeline consistent?

### 3. Output Report
Provide a brief, prioritized report highlighting any missed items or areas for improvement.
"""
